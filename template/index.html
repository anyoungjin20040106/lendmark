<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"></script>
  <title>관광지 추천 사이트</title>
</head>

<body>
  <h1 style="text-align: center;">남양주 관광지 추천 사이트</h1>
  <form method="post" action="/map" onsubmit="return setlocal(event)">
    <input type="hidden" name="x">
    <input type="hidden" name="y">
    <select name="kind">
      <option value="">모두보기</option>
      {{kind|safe}}
    </select>
    <select name="distance">
      <option value="10">10km</option>
      <option value="20">20km</option>
      <option value="30">30km</option>
    </select>
    <button>관광지 찾기</button>
  </form>

</body>
<script>
  function setlocal(event) {
    event.preventDefault(); // 폼 제출 방지
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function (position) {
        let x = document.getElementsByName('x')[0];
        x.value = position.coords.longitude;
        let y = document.getElementsByName('y')[0];
        y.value = position.coords.latitude;

        // 위치 정보가 설정되면 폼을 제출
        document.forms[0].submit();
      }, function (error) {
        console.error(error);
        alert('위치 정보를 가져오는데 실패했습니다.');
      }, {
        enableHighAccuracy: false,
        maximumAge: 0,
        timeout: Infinity
      });
    } else {
      alert('GPS를 켜주세요');
    }
  }
</script>

</html>
