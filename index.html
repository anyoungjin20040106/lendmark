<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남양주 관광지 서비스</title>
</head>

<body>
    <form id="locationForm" onsubmit="return OnSubmit();" action="/map" method="post">
        <center>
            <h1>남양주 관광지 서비스</h1>
            <h2>남양주 관광지의 위치를 보고싶으면 아래 버튼을 눌러주세요</h2>
            <input name="lat" type="hidden">
            <input name="lon" type="hidden">
            <button type="submit">남양주 관광지 보기</button>
        </center>
    </form>
</body>
<script>
    function OnSubmit(){
        if(navigator.geolocation)
            navigator.geolocation.getCurrentPosition((postion)=>{
                var lat=document.getElementsByName('lat')[0]
                lat.value=postion.coords.latitude;
                var lon=document.getElementsByName('lon')[0]
                lon.value=postion.coords.longitude;
                alert("위치 찾는중");
                document.getElementById('locationForm').submit();
        });
        else
            alert("GPS를 활성화 해주세요");
        return navigator.geolocation;
    }
    </script>
</html>
